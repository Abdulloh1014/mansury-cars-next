
services:
  mansory-next:
    container_name: mansory-next
    restart: always
    image: node:20.10.0
    ports:
      - 4000:3000
    environment:
      - PORT=3000
      - NEXTAUTH_URL=https://mansury.uz
      - NEXTAUTH_SECRET=mansury_secret_2024  # Bu xohlagan matningiz bo'lishi mumkin
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

    volumes:
      - ./:/usr/src/mansory-next
    working_dir: /usr/src/mansory-next

    networks:
      - monorepo-network

      # FOR PRODUCTION
    command: bash -c "yarn && yarn run build && yarn run start"

    
networks:
  monorepo-network:
    driver: bridge

    # mansory-next:  localhost: 4000 <=> container:3000
    # mansory-api:   localhost: 4001 <=> container:3007
    # mansory-batch: localhost: 4002 <=> container:3008